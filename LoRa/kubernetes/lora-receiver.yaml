# Kuber-Tuber LoRa Receiver — Kubernetes Manifest
#
# Deploys the lora-receiver Flask service into the lora-demo namespace.
#
# Resources (in order):
#   1. Namespace     — lora-demo
#   2. ConfigMap     — the receiver_service.py Flask application
#   3. Deployment    — python:3.11-slim, installs flask, runs the app
#   4. Service       — ClusterIP on port 8080, named lora-receiver
#
# Apply:
#   kubectl apply -f lora-receiver.yaml
#
# Verify:
#   kubectl get all -n lora-demo
#   kubectl logs -n lora-demo deployment/lora-receiver -f
#
# The bridge reaches the receiver at:
#   http://lora-receiver.lora-demo.svc.cluster.local:8080/api/v1/messages

---
apiVersion: v1
kind: Namespace
metadata:
  name: lora-demo

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lora-receiver-script
  namespace: lora-demo
data:
  receiver_service.py: |
    #!/usr/bin/env python3
    """
    Kuber-Tuber Receiver Service
    Runs inside the Kubernetes cluster (lora-demo namespace).

    Function:
        - Accepts POST /api/v1/messages with JSON body
        - Validates sequence numbers (replay protection)
        - Logs the message to stdout (which Kubernetes captures)
        - Returns 200 OK on success, 4xx on errors

    This is a Flask application. It listens on port 8080.
    """

    import os
    import json
    import time
    from flask import Flask, request, jsonify

    app = Flask(__name__)

    # In-memory replay protection per source.
    # Resets on pod restart — acceptable for this demo.
    last_seq = {}

    @app.route('/api/v1/messages', methods=['POST'])
    def receive_message():
        if not request.is_json:
            return jsonify({"status": "error", "reason": "Content-Type must be application/json"}), 400

        data = request.get_json()

        required_fields = ['seq', 'message', 'source']
        for field in required_fields:
            if field not in data:
                return jsonify({"status": "error", "reason": f"Missing required field: {field}"}), 400

        seq    = data['seq']
        msg    = data['message']
        source = data['source']
        ts     = data.get('timestamp', time.time())

        if not isinstance(seq, int) or seq < 0:
            return jsonify({"status": "error", "reason": "seq must be a non-negative integer"}), 400

        if not isinstance(msg, str) or len(msg) == 0:
            return jsonify({"status": "error", "reason": "message must be a non-empty string"}), 400

        if not isinstance(source, str) or len(source) == 0:
            return jsonify({"status": "error", "reason": "source must be a non-empty string"}), 400

        last = last_seq.get(source, -1)
        if seq <= last:
            app.logger.warning(f"Replay attempt: source={source}, seq={seq} <= last={last}")
            return jsonify({"status": "error", "reason": "Sequence number out of order (possible replay)"}), 400

        last_seq[source] = seq

        human_ts = time.strftime('%Y-%m-%dT%H:%M:%S', time.localtime(ts))
        app.logger.info(f"[{human_ts}] source={source} seq={seq} msg={msg}")
        print(f"ACCEPTED: {human_ts} | {source} | seq {seq} | {msg}", flush=True)

        return jsonify({"status": "accepted", "seq": seq}), 200

    @app.route('/health', methods=['GET'])
    def health():
        return jsonify({"status": "healthy"}), 200

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080, debug=False)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lora-receiver
  namespace: lora-demo
  labels:
    app: lora-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lora-receiver
  template:
    metadata:
      labels:
        app: lora-receiver
    spec:
      containers:
        - name: lora-receiver
          image: python:3.11-slim
          command:
            - sh
            - -c
            - pip install flask --quiet && python /app/receiver_service.py
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: script
              mountPath: /app
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: script
          configMap:
            name: lora-receiver-script

---
apiVersion: v1
kind: Service
metadata:
  name: lora-receiver
  namespace: lora-demo
spec:
  selector:
    app: lora-receiver
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
