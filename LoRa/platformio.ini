[env:cardputer]
platform = espressif32
board = m5stack-cardputer
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM0   ; adjust for your OS
lib_deps = 
    m5stack/M5Cardputer@^1.1.0
    jgromes/RadioLib@^6.2.0
    ; No separate AES library needed – uses built-in mbedtls
build_flags = 
    -DCORE_DEBUG_LEVEL=0